<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Стажёр · киберпанк</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #0a0215;
            color: white;
            padding: 16px 12px 80px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        
        /* Фильтры */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .filter-btn {
            background: transparent;
            border: 2px solid #ff1a75;
            border-radius: 30px;
            padding: 10px;
            color: white;
            cursor: pointer;
            flex: 1;
        }
        .filter-btn.active {
            background: #ff1a75;
            color: black;
        }
        
        /* Секции квестов */
        .quest-section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #ff99ff;
            margin-bottom: 10px;
            padding-left: 8px;
        }
        .quest-item {
            background: #1e0a2a;
            border-left: 6px solid #ff1a75;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .quest-item.overdue {
            border-left-color: #ff0000;
        }
        .quest-item.today {
            border-left-color: #00ff88;
        }
        .quest-check {
            width: 28px;
            height: 28px;
            border: 3px solid #ff1a75;
            border-radius: 50%;
            flex-shrink: 0;
            cursor: pointer;
        }
        .quest-check.done {
            background: #ff1a75;
        }
        .quest-content {
            flex: 1;
        }
        .quest-title {
            font-size: 18px;
            font-weight: bold;
        }
        .quest-meta {
            font-size: 14px;
            color: #bf8fbf;
            margin: 4px 0;
        }
        .quest-date {
            font-size: 12px;
            color: #b284be;
        }
        
        /* Модалка редактирования */
        .edit-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .edit-modal.active {
            display: flex;
        }
        .edit-form {
            background: #1a0b2e;
            border: 2px solid #ff1a75;
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }
        .edit-form input,
        .edit-form select {
            width: 100%;
            background: #2d0d40;
            border: 2px solid #ff1a75;
            border-radius: 30px;
            padding: 12px;
            color: white;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .btn-neon {
            background: transparent;
            border: 2px solid #ff1a75;
            border-radius: 40px;
            padding: 14px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        
        /* Вкладки */
        .page { display: none; }
        .page.active { display: block; }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #12031f;
            border-top: 2px solid #ff1a75;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 100;
        }
        .tab {
            color: #b284be;
            cursor: pointer;
            text-align: center;
        }
        .tab.active {
            color: #ffb3ff;
        }
        
        /* Бонусы и уровни */
        .level-card {
            background: #1a0b2e;
            border: 2px solid #ff99ff;
            border-radius: 50px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .skill-card {
            background: #1a0b2e;
            border: 1px solid #aa44ff;
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 16px;
        }
        .progress-bg {
            width: 100%;
            height: 18px;
            background: #1f1030;
            border-radius: 40px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #ff1a75;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ГЛАВНАЯ -->
        <div id="pageHome" class="page active">
            <div class="level-card">
                <div id="globalLevel">1</div>
                <div id="globalTitle">Новичок</div>
                <div class="progress-bg">
                    <div class="progress-fill" id="globalProgress"></div>
                </div>
            </div>
            <div id="skills"></div>
        </div>

        <!-- КВЕСТЫ -->
        <div id="pageQuests" class="page">
            <h2>КВЕСТЫ</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">ВСЕ</button>
                <button class="filter-btn" data-filter="urgent">СРОЧНЫЕ</button>
                <button class="filter-btn" data-filter="overdue">ПРОСРОЧЕННЫЕ</button>
            </div>
            <div id="quests"></div>
        </div>

        <!-- НОВЫЙ КВЕСТ -->
        <div id="pageNewQuest" class="page">
            <h2>НОВЫЙ КВЕСТ</h2>
            <input type="text" id="questName" placeholder="название" style="width:100%; margin-bottom:10px; padding:10px;">
            <select id="questType" style="width:100%; margin-bottom:10px; padding:10px;">
                <option value="designerTheory">Дизайнер (теория)</option>
                <option value="designerPractice">Дизайнер (практика)</option>
                <option value="english">Английский</option>
                <option value="style">Персональный стиль</option>
            </select>
            <select id="questDifficulty" style="width:100%; margin-bottom:10px; padding:10px;">
                <option value="20">★ Задача (20 XP)</option>
                <option value="50">★★ Миссия (50 XP)</option>
                <option value="100">★★★ Операция (100 XP)</option>
                <option value="200">★★★★ Эпическая миссия (200 XP)</option>
            </select>
            <input type="date" id="questDate" style="width:100%; margin-bottom:10px; padding:10px;">
            <button class="btn-neon" id="addQuestBtn">СОЗДАТЬ</button>
        </div>

        <!-- СТАТИСТИКА -->
        <div id="pageStats" class="page">
            <h2>СТАТИСТИКА</h2>
            <div>Всего XP: <span id="totalXP">0</span></div>
            <div>Выполнено: <span id="doneCount">0</span></div>
            <button class="btn-neon" id="resetBtn">СБРОСИТЬ</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div class="tab-bar">
        <div class="tab active" data-page="pageHome">🏠 Главная</div>
        <div class="tab" data-page="pageQuests">📋 Квесты</div>
        <div class="tab" data-page="pageNewQuest">➕ Новое</div>
        <div class="tab" data-page="pageStats">📊 Стат</div>
    </div>

    <!-- МОДАЛКА РЕДАКТИРОВАНИЯ -->
    <div class="edit-modal" id="editModal">
        <div class="edit-form">
            <h3>Редактировать</h3>
            <input type="text" id="editName">
            <select id="editType">
                <option value="designerTheory">Дизайнер (теория)</option>
                <option value="designerPractice">Дизайнер (практика)</option>
                <option value="english">Английский</option>
                <option value="style">Персональный стиль</option>
            </select>
            <select id="editDifficulty">
                <option value="20">★ Задача</option>
                <option value="50">★★ Миссия</option>
                <option value="100">★★★ Операция</option>
                <option value="200">★★★★ Эпическая миссия</option>
            </select>
            <input type="date" id="editDate">
            <button class="btn-neon" id="saveEditBtn">Сохранить</button>
        </div>
    </div>

    <script>
        // Данные
        let state = {
            designerTheory: 0,
            designerPractice: 0,
            english: 0,
            style: 0,
            coins: 0,
            streak: 0,
            quests: [
                { id: 1, name: 'Прочитать главу', type: 'designerTheory', xp: 20, date: '2025-04-08', done: false },
                { id: 2, name: 'Встреча', type: 'designerPractice', xp: 50, date: '2025-04-09', done: false },
                { id: 3, name: 'Duolingo', type: 'english', xp: 20, date: '2025-04-07', done: false },
                { id: 4, name: 'Защита', type: 'designerPractice', xp: 200, date: '2025-04-20', done: false }
            ]
        };

        // Ранги
        const ranks = ['Новичок','Ученик','Джуниор','Мидл','Сеньор','Мастер','Грандмастер','Легенда','Мифический','Божественный'];
        const thresholds = [0,100,250,450,700,1000,1350,1750,2200,2700];

        // Состояние
        let currentFilter = 'all';
        let editingId = null;

        // Функции
        function getLevel(xp) {
            for (let i = thresholds.length-1; i>=0; i--) if (xp >= thresholds[i]) return i+1;
            return 1;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            let today = new Date(); today.setHours(0,0,0,0);
            let date = new Date(dateStr); date.setHours(0,0,0,0);
            let diff = Math.ceil((date - today) / (1000*60*60*24));
            if (diff === 0) return 'сегодня';
            if (diff === 1) return 'до завтра';
            if (diff < 0) return `просрочено на ${-diff} дн.`;
            return dateStr.split('-').reverse().join('.');
        }

        function isOverdue(dateStr) {
            if (!dateStr) return false;
            return new Date(dateStr) < new Date().setHours(0,0,0,0);
        }

        function isUrgent(dateStr) {
            if (!dateStr) return false;
            let diff = Math.ceil((new Date(dateStr) - new Date().setHours(0,0,0,0)) / (1000*60*60*24));
            return diff >= 0 && diff <= 1;
        }

        function save() {
            localStorage.setItem('stazhor', JSON.stringify(state));
        }

        function load() {
            let saved = localStorage.getItem('stazhor');
            if (saved) state = JSON.parse(saved);
        }
        load();

        // Рендер
        function renderHome() {
            let dt = state.designerTheory, dp = state.designerPractice;
            let en = state.english, st = state.style;
            let global = Math.floor(Math.sqrt(Math.min(getLevel(dt), getLevel(dp)) + getLevel(en) + getLevel(st)) * 1.5);
            global = Math.min(10, Math.max(1, global));
            
            document.getElementById('globalLevel').innerText = global;
            document.getElementById('globalTitle').innerText = ranks[global-1];
            
            let total = dt + dp + en + st;
            document.getElementById('globalProgress').style.width = (total % 200) / 2 + '%';
            
            document.getElementById('skills').innerHTML = `
                <div class="skill-card">📘 Дизайнер (теория): ${dt} XP</div>
                <div class="skill-card">🛠 Дизайнер (практика): ${dp} XP</div>
                <div class="skill-card">🇬🇧 Английский: ${en} XP</div>
                <div class="skill-card">✨ Стиль: ${st} XP</div>
            `;
        }

        function renderQuests() {
            let active = state.quests.filter(q => !q.done);
            
            if (currentFilter === 'urgent') active = active.filter(q => isUrgent(q.date));
            if (currentFilter === 'overdue') active = active.filter(q => isOverdue(q.date));
            
            let byXp = {
                20: [], 50: [], 100: [], 200: []
            };
            active.forEach(q => byXp[q.xp].push(q));
            
            let html = '';
            let titles = {20:'ЗАДАЧА ★',50:'МИССИЯ ★★',100:'ОПЕРАЦИЯ ★★★',200:'ЭПИЧЕСКАЯ МИССИЯ ★★★★'};
            
            for (let xp in titles) {
                if (byXp[xp].length) {
                    html += `<div class="quest-section"><div class="section-title">${titles[xp]}</div>`;
                    byXp[xp].forEach(q => {
                        let cls = isOverdue(q.date) ? 'overdue' : (isUrgent(q.date) ? 'today' : '');
                        html += `
                            <div class="quest-item ${cls}" data-id="${q.id}">
                                <div class="quest-check" data-id="${q.id}"></div>
                                <div class="quest-content">
                                    <div class="quest-title">${q.name}</div>
                                    <div class="quest-meta">+${q.xp} XP</div>
                                    <div class="quest-date">${formatDate(q.date)}</div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }
            }
            
            document.getElementById('quests').innerHTML = html || '<p>Нет активных квестов</p>';
            
            // Обработчики
            document.querySelectorAll('.quest-check').forEach(el => {
                el.addEventListener('click', e => {
                    e.stopPropagation();
                    let id = parseInt(e.target.dataset.id);
                    let q = state.quests.find(x => x.id === id);
                    if (q) {
                        q.done = true;
                        if (q.type === 'designerTheory') state.designerTheory += q.xp;
                        if (q.type === 'designerPractice') state.designerPractice += q.xp;
                        if (q.type === 'english') state.english += q.xp;
                        if (q.type === 'style') state.style += q.xp;
                        save();
                        renderHome();
                        renderQuests();
                    }
                });
            });
            
            document.querySelectorAll('.quest-item').forEach(el => {
                el.addEventListener('click', e => {
                    if (e.target.classList.contains('quest-check')) return;
                    editingId = parseInt(el.dataset.id);
                    let q = state.quests.find(x => x.id === editingId);
                    if (q) {
                        document.getElementById('editName').value = q.name;
                        document.getElementById('editType').value = q.type;
                        document.getElementById('editDifficulty').value = q.xp;
                        document.getElementById('editDate').value = q.date || '';
                        document.getElementById('editModal').classList.add('active');
                    }
                });
            });
        }

        function renderStats() {
            let total = state.designerTheory + state.designerPractice + state.english + state.style;
            document.getElementById('totalXP').innerText = total;
            document.getElementById('doneCount').innerText = state.quests.filter(q => q.done).length;
        }

        // Вкладки
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.page).classList.add('active');
            });
        });

        // Фильтры
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderQuests();
            });
        });

        // Добавление квеста
        document.getElementById('addQuestBtn').addEventListener('click', () => {
            let name = document.getElementById('questName').value;
            if (!name) return alert('Введите название');
            let newId = Math.max(...state.quests.map(q=>q.id), 0) + 1;
            state.quests.push({
                id: newId,
                name: name,
                type: document.getElementById('questType').value,
                xp: parseInt(document.getElementById('questDifficulty').value),
                date: document.getElementById('questDate').value,
                done: false
            });
            save();
            renderQuests();
            document.querySelector('[data-page="pageQuests"]').click();
        });

        // Сохранение редактирования
        document.getElementById('saveEditBtn').addEventListener('click', () => {
            if (editingId) {
                let q = state.quests.find(x => x.id === editingId);
                if (q) {
                    q.name = document.getElementById('editName').value;
                    q.type = document.getElementById('editType').value;
                    q.xp = parseInt(document.getElementById('editDifficulty').value);
                    q.date = document.getElementById('editDate').value;
                    save();
                    renderQuests();
                }
            }
            document.getElementById('editModal').classList.remove('active');
            editingId = null;
        });

        // Закрытие модалки кликом вне
        document.getElementById('editModal').addEventListener('click', e => {
            if (e.target === document.getElementById('editModal')) {
                document.getElementById('editModal').classList.remove('active');
                editingId = null;
            }
        });

        // Сброс
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('Сбросить прогресс?')) {
                state = {
                    designerTheory: 0,
                    designerPractice: 0,
                    english: 0,
                    style: 0,
                    coins: 0,
                    streak: 0,
                    quests: [
                        { id: 1, name: 'Прочитать главу', type: 'designerTheory', xp: 20, date: '2025-04-08', done: false },
                        { id: 2, name: 'Встреча', type: 'designerPractice', xp: 50, date: '2025-04-09', done: false },
                        { id: 3, name: 'Duolingo', type: 'english', xp: 20, date: '2025-04-07', done: false },
                        { id: 4, name: 'Защита', type: 'designerPractice', xp: 200, date: '2025-04-20', done: false }
                    ]
                };
                save();
                renderHome();
                renderQuests();
                renderStats();
            }
        });

        // Старт
        renderHome();
        renderQuests();
        renderStats();
    </script>
</body>
</html>
