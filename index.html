<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title> СТАЖЁР · киберпанк ✦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0215;
            color: #f0e0ff;
            min-height: 100vh;
            padding: 16px 12px 80px;
            background-image: radial-gradient(circle at 30% 40%, #2e0b40 0%, #0a0215 80%);
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        .bonus-card {
            background: rgba(25, 5, 35, 0.8);
            border: 2px solid #ff1a75;
            border-radius: 30px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 25px #ff1a7540;
        }
        .bonus-stats {
            display: flex;
            gap: 20px;
        }
        .bonus-item {
            text-align: center;
        }
        .bonus-value {
            font-size: 24px;
            font-weight: bold;
            color: #ff99ff;
        }
        .bonus-label {
            font-size: 12px;
            color: #b284be;
        }
        .bonus-btn {
            background: #ff1a75;
            border: none;
            border-radius: 30px;
            padding: 12px 20px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px #ff66b2;
            -webkit-appearance: none;
        }
        .hero {
            background: rgba(25, 5, 35, 0.7);
            backdrop-filter: blur(4px);
            border: 2px solid #ff1a75;
            border-radius: 40px;
            padding: 20px 16px;
            margin-bottom: 24px;
            text-align: center;
        }
        .avatar-large {
            width: 200px;
            height: 260px;
            margin: 0 auto 12px;
            border: 4px solid #ff1a75;
            border-radius: 30px;
            overflow: hidden;
            background: #2d0d40;
            box-shadow: 0 0 30px #ff1a75;
        }
        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b284be;
            font-size: 18px;
        }
        .upload-btn {
            background: rgba(255, 26, 117, 0.2);
            border: 2px solid #ff1a75;
            border-radius: 40px;
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            margin-top: 8px;
            -webkit-appearance: none;
        }
        .upload-btn:active {
            background: #ff1a75;
            color: black;
        }
        .level-card {
            background: linear-gradient(145deg, #1a0b2e, #0e0320);
            border: 2px solid #ff99ff;
            border-radius: 50px;
            padding: 16px 24px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 0 30px #cc33ff;
        }
        .level-number {
            font-size: 48px;
            font-weight: bold;
            color: #ffb3ff;
            text-shadow: 0 0 20px #ff1a75;
        }
        .level-title {
            font-size: 24px;
            color: #e0b0ff;
        }
        .progress-bg {
            width: 100%;
            height: 18px;
            background: #1f1030;
            border-radius: 40px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff3b9c, #ff80bf);
            box-shadow: 0 0 20px #ff1a75;
            border-radius: 40px;
        }
        .skill-card {
            background: rgba(18, 5, 28, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid #aa44ff;
            border-radius: 28px;
            padding: 18px 16px;
            margin-bottom: 16px;
        }
        .skill-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #f0c5ff;
        }
        .skill-level-badge {
            margin-left: auto;
            background: #330066;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 14px;
            border: 1px solid #ff1a75;
        }
        .skill-stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #c9a0dc;
            margin-top: 8px;
        }
        .page { display: none; }
        .page.active { display: block; }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #12031f;
            backdrop-filter: blur(12px);
            border-top: 2px solid #ff1a75;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 14px;
            z-index: 100;
        }
        .tab {
            color: #b284be;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            padding: 4px 12px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .tab.active {
            color: #ffb3ff;
            text-shadow: 0 0 10px #ff1a75;
            transform: translateY(-2px);
        }
        .tab span { font-size: 24px; display: block; margin-bottom: 2px; }
        .quest-item {
            background: #1e0a2a;
            border-left: 6px solid #ff1a75;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .quest-check {
            width: 28px;
            height: 28px;
            border: 3px solid #ff1a75;
            border-radius: 50%;
            flex-shrink: 0;
            pointer-events: none;
        }
        .quest-check.done {
            background: #ff1a75;
            box-shadow: 0 0 20px #ff66b2;
            position: relative;
        }
        .quest-check.done::after {
            content: "✓";
            color: black;
            font-weight: bold;
            display: flex;
            justify-content: center;
            line-height: 28px;
        }
        .quest-content { flex: 1; }
        .quest-title { font-size: 18px; font-weight: bold; }
        .quest-meta { display: flex; gap: 16px; font-size: 14px; color: #bf8fbf; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: #ffb3ff; }
        .form-control {
            width: 100%;
            background: #1f0a30;
            border: 2px solid #7a2a9c;
            border-radius: 30px;
            padding: 14px;
            color: white;
            font-size: 16px;
            -webkit-appearance: none;
        }
        .btn-neon {
            background: transparent;
            border: 2px solid #ff1a75;
            border-radius: 40px;
            padding: 14px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            -webkit-appearance: none;
        }
        .btn-neon:active {
            background: #ff1a75;
            color: black;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            background: #1e0a2a;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ГЛАВНАЯ -->
        <div id="pageHome" class="page active">
            <div class="bonus-card" id="bonusCard">
                <div class="bonus-stats">
                    <div class="bonus-item">
                        <div class="bonus-value" id="streakDays">0</div>
                        <div class="bonus-label">дней подряд 🔥</div>
                    </div>
                    <div class="bonus-item">
                        <div class="bonus-value" id="coinBalance">0</div>
                        <div class="bonus-label">🪙 монет</div>
                    </div>
                </div>
                <button class="bonus-btn" id="dailyBonusBtn">🎁 забрать</button>
            </div>

            <div class="level-card">
                <div class="level-number" id="globalLevel">1</div>
                <div class="level-title" id="globalTitle">Новичок</div>
                <div class="progress-bg">
                    <div class="progress-fill" id="globalProgress" style="width:0%"></div>
                </div>
            </div>

            <div class="hero">
                <div class="avatar-large" id="avatarLarge">
                    <img id="avatarImg" src="" style="display: none;">
                    <div class="avatar-placeholder" id="avatarPlaceholder">✦ твой образ ✦</div>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <button class="upload-btn" id="uploadBtn">📸 загрузить фото</button>
            </div>

            <div id="skillsContainer"></div>
        </div>

        <!-- КВЕСТЫ -->
        <div id="pageQuests" class="page">
            <h2 style="margin-bottom: 20px;">📋 КВЕСТЫ</h2>
            <div id="questsList"></div>
        </div>

        <!-- НОВЫЙ КВЕСТ -->
        <div id="pageNewQuest" class="page">
            <h2 style="margin-bottom: 20px;">➕ НОВЫЙ КВЕСТ</h2>
            <div class="form-group">
                <label>название</label>
                <input type="text" class="form-control" id="questName">
            </div>
            <div class="form-group">
                <label>тип</label>
                <select class="form-control" id="questType">
                    <option value="designerTheory">🎨 Дизайнер (теория)</option>
                    <option value="designerPractice">🎨 Дизайнер (практика)</option>
                    <option value="english">🇬🇧 Английский</option>
                    <option value="style">✨ Персональный стиль</option>
                </select>
            </div>
            <div class="form-group">
                <label>сложность</label>
                <select class="form-control" id="questDifficulty">
                    <option value="20">★ 20 XP</option>
                    <option value="50">★★ 50 XP</option>
                    <option value="100">★★★ 100 XP</option>
                </select>
            </div>
            <button class="btn-neon" id="addQuestBtn">🔮 СОЗДАТЬ</button>
        </div>

        <!-- СТАТИСТИКА -->
        <div id="pageStats" class="page">
            <h2 style="margin-bottom: 20px;">📊 СТАТИСТИКА</h2>
            <div class="stat-row"><span>всего XP</span> <span id="totalXP">0</span></div>
            <div class="stat-row"><span>выполнено квестов</span> <span id="doneCount">0</span></div>
            <div class="stat-row"><span>🪙 монет</span> <span id="statsCoins">0</span></div>
            <div class="stat-row"><span>🔥 дней подряд</span> <span id="statsStreak">0</span></div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active" data-page="pageHome"><span>🏠</span>главная</div>
        <div class="tab" data-page="pageQuests"><span>📋</span>квесты</div>
        <div class="tab" data-page="pageNewQuest"><span>➕</span>новое</div>
        <div class="tab" data-page="pageStats"><span>📊</span>стат</div>
    </div>

    <script>
        (function() {
            // ========== СОСТОЯНИЕ ==========
            let state = {
                designerTheory: 450,
                designerPractice: 380,
                english: 820,
                style: 320,
                coins: 120,
                streak: 3,
                lastLogin: new Date().toDateString(),
                bonusClaimedToday: false,
                quests: [
                    { id: 1, name: 'Прочитать главу', type: 'designerTheory', xp: 20, done: false },
                    { id: 2, name: 'Встреча с дизайнером', type: 'designerPractice', xp: 50, done: false },
                    { id: 3, name: 'Duolingo', type: 'english', xp: 20, done: false },
                ]
            };

            // ========== РАНГИ ==========
            const globalRanks = [
                'Новичок', 'Ученик', 'Джуниор', 'Мидл', 'Сеньор',
                'Мастер', 'Грандмастер', 'Легенда', 'Мифический', '✦ Божественный ✦'
            ];
            const englishRanks = [
                'Исследователь', 'Говорун', 'Коммуникатор', 'Свободный',
                'Мастер слова', 'Поэт', 'Оратор', 'Дипломат', 'Литератор', '✦ Хранитель языка ✦'
            ];
            const styleRanks = [
                'Наблюдатель', 'Стилист', 'Творец', 'Авторский стиль',
                'Икона стиля', 'Легенда', 'Искусство', 'Маэстро', 'Гений', '✦ Бессмертный стиль ✦'
            ];

            // ========== XP ПОРОГИ ==========
            const thresholds = [0, 100, 250, 450, 700, 1000, 1350, 1750, 2200, 2700, 3300];

            // ========== ФУНКЦИИ ==========
            function getLevel(xp) {
                for (let i = thresholds.length-1; i>=0; i--) if (xp >= thresholds[i]) return i+1;
                return 1;
            }
            function getProgress(xp) {
                let lvl = getLevel(xp);
                if (lvl >= thresholds.length) return 100;
                let current = thresholds[lvl-1];
                let next = thresholds[lvl];
                return Math.min(100, Math.floor(((xp - current) / (next - current)) * 100));
            }
            function getGlobalLevel() {
                let l1 = getLevel(state.designerTheory);
                let l2 = getLevel(state.designerPractice);
                let l3 = getLevel(state.english);
                let l4 = getLevel(state.style);
                let desLvl = Math.min(l1, l2);
                let sum = desLvl + l3 + l4;
                let global = Math.floor(Math.sqrt(sum) * 1.5);
                return Math.min(10, Math.max(1, global));
            }

            // ========== СОХРАНЕНИЕ ==========
            function saveState() {
                localStorage.setItem('stazhor_state', JSON.stringify(state));
            }
            function loadState() {
                let saved = localStorage.getItem('stazhor_state');
                if (saved) {
                    try {
                        let loaded = JSON.parse(saved);
                        state = { ...state, ...loaded };
                    } catch(e) {}
                }
            }
            loadState();

            // ========== БОНУС ==========
            function checkDailyBonus() {
                let today = new Date().toDateString();
                if (state.lastLogin !== today) {
                    let yesterday = new Date(Date.now() - 86400000).toDateString();
                    if (state.lastLogin === yesterday) {
                        state.streak++;
                    } else {
                        state.streak = 1;
                    }
                    state.lastLogin = today;
                    state.bonusClaimedToday = false;
                    saveState();
                }
                updateBonusUI();
            }
            function claimBonus() {
                let today = new Date().toDateString();
                if (state.lastLogin === today && !state.bonusClaimedToday) {
                    state.coins += 10 + state.streak * 2;
                    state.designerTheory += 10;
                    state.designerPractice += 10;
                    state.english += 10;
                    state.style += 10;
                    state.bonusClaimedToday = true;
                    saveState();
                    renderHome();
                    renderStats();
                }
                updateBonusUI();
            }
            function updateBonusUI() {
                document.getElementById('streakDays').innerText = state.streak || 0;
                document.getElementById('coinBalance').innerText = state.coins || 0;
            }

            // ========== ОТРИСОВКА ==========
            function renderHome() {
                let dt = state.designerTheory, dp = state.designerPractice;
                let en = state.english, st = state.style;
                let desLvl = Math.min(getLevel(dt), getLevel(dp));
                let enLvl = getLevel(en);
                let stLvl = getLevel(st);
                let global = getGlobalLevel();

                let html = `
                    <div class="skill-card">
                        <div class="skill-header">
                            <span>🎨 ДИЗАЙНЕР</span>
                            <span class="skill-level-badge">ур.${desLvl} · ${globalRanks[desLvl-1]}</span>
                        </div>
                        <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(getProgress(dt), getProgress(dp))}%"></div></div>
                        <div class="skill-stats">
                            <span>📘 теория ${dt} XP</span>
                            <span>🛠 практика ${dp} XP</span>
                        </div>
                    </div>
                    <div class="skill-card">
                        <div class="skill-header">
                            <span>🇬🇧 АНГЛИЙСКИЙ</span>
                            <span class="skill-level-badge">ур.${enLvl} · ${englishRanks[enLvl-1]}</span>
                        </div>
                        <div class="progress-bg"><div class="progress-fill" style="width:${getProgress(en)}%"></div></div>
                        <div class="skill-stats"><span>${en} XP</span></div>
                    </div>
                    <div class="skill-card">
                        <div class="skill-header">
                            <span>✨ ПЕРСОНАЛЬНЫЙ СТИЛЬ</span>
                            <span class="skill-level-badge">ур.${stLvl} · ${styleRanks[stLvl-1]}</span>
                        </div>
                        <div class="progress-bg"><div class="progress-fill" style="width:${getProgress(st)}%"></div></div>
                        <div class="skill-stats"><span>${st} XP</span></div>
                    </div>
                `;
                document.getElementById('skillsContainer').innerHTML = html;

                document.getElementById('globalLevel').innerText = global;
                document.getElementById('globalTitle').innerText = globalRanks[global-1];
                let globalXp = dt + dp + en + st;
                let globalProgress = (globalXp % 200) / 2;
                document.getElementById('globalProgress').style.width = Math.min(100, globalProgress) + '%';

                updateBonusUI();
            }

            function renderQuests() {
                let active = state.quests.filter(q => !q.done);
                let list = document.getElementById('questsList');
                if (active.length === 0) {
                    list.innerHTML = '<p style="text-align:center;">✨ всё сделано ✨</p>';
                    return;
                }
                let html = '';
                active.forEach(q => {
                    let typeName = {
                        designerTheory: '🎨 теория',
                        designerPractice: '🛠 практика',
                        english: '🇬🇧 английский',
                        style: '✨ стиль'
                    }[q.type] || q.type;
                    html += `
                        <div class="quest-item" data-id="${q.id}">
                            <div class="quest-check ${q.done ? 'done' : ''}"></div>
                            <div class="quest-content">
                                <div class="quest-title">${q.name}</div>
                                <div class="quest-meta"><span>${typeName} +${q.xp} XP</span></div>
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
                
                // Добавляем обработчики на телефоне
                document.querySelectorAll('.quest-item').forEach(item => {
                    item.addEventListener('click', function(e) {
                        let id = parseInt(this.dataset.id);
                        let q = state.quests.find(x => x.id === id);
                        if (q && !q.done) {
                            q.done = true;
                            switch(q.type) {
                                case 'designerTheory': state.designerTheory += q.xp; break;
                                case 'designerPractice': state.designerPractice += q.xp; break;
                                case 'english': state.english += q.xp; break;
                                case 'style': state.style += q.xp; break;
                            }
                            state.coins += Math.floor(q.xp / 10);
                            saveState();
                            renderHome();
                            renderQuests();
                            renderStats();
                        }
                    });
                });
            }

            function renderStats() {
                let total = state.designerTheory + state.designerPractice + state.english + state.style;
                document.getElementById('totalXP').innerText = total;
                document.getElementById('doneCount').innerText = state.quests.filter(q => q.done).length;
                document.getElementById('statsCoins').innerText = state.coins;
                document.getElementById('statsStreak').innerText = state.streak;
            }

            // ========== АВАТАРКА ==========
            const fileInput = document.getElementById('fileInput');
            const uploadBtn = document.getElementById('uploadBtn');
            const avatarImg = document.getElementById('avatarImg');
            const avatarPlaceholder = document.getElementById('avatarPlaceholder');
            
            uploadBtn.addEventListener('click', (e) => {
                e.preventDefault();
                fileInput.click();
            });
            
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        avatarImg.src = ev.target.result;
                        avatarImg.style.display = 'block';
                        avatarPlaceholder.style.display = 'none';
                        localStorage.setItem('stazhor_avatar', ev.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            const savedAvatar = localStorage.getItem('stazhor_avatar');
            if (savedAvatar) {
                avatarImg.src = savedAvatar;
                avatarImg.style.display = 'block';
                avatarPlaceholder.style.display = 'none';
            }

            // ========== ВКЛАДКИ ==========
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById(this.dataset.page).classList.add('active');
                });
            });

            // ========== ДОБАВЛЕНИЕ КВЕСТА ==========
            document.getElementById('addQuestBtn').addEventListener('click', function(e) {
                e.preventDefault();
                let name = document.getElementById('questName').value.trim();
                if (!name) return alert('введи название');
                let type = document.getElementById('questType').value;
                let xp = parseInt(document.getElementById('questDifficulty').value);
                let newId = state.quests.length ? Math.max(...state.quests.map(q=>q.id)) + 1 : 1;
                state.quests.push({ id: newId, name, type, xp, done: false });
                saveState();
                document.getElementById('questName').value = '';
                renderQuests();
                document.querySelector('[data-page="pageQuests"]').click();
            });

            // ========== БОНУС ==========
            document.getElementById('dailyBonusBtn').addEventListener('click', function(e) {
                e.preventDefault();
                claimBonus();
            });

            // ========== СТАРТ ==========
            checkDailyBonus();
            renderHome();
            renderQuests();
            renderStats();
        })();
    </script>
</body>
</html>
